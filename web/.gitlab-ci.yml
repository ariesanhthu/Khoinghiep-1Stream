stages:
  - build
  - deploy

variables:
  REGISTRY: $CI_REGISTRY_IMAGE
  IMAGE_TAG: $CI_COMMIT_SHA
  GIT_STRATEGY: none
  DEPLOY_HOST: "144.91.68.248"
  DEPLOY_USER: "root"
  DEPLOY_HOST_KEY: "|1|PvmVDA/ncJKt0sL7GYXkV2/lPoQ=|VErBLBj7AuAVAb5gTzzPtQ1SoF0= ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIUI7Us2pMOj5onvkdrcgm7x2883NUfiRCIRl12HwKLu"

# ─── Build Stage ──────────────────────────────────────────────────
build:web-v2:
  stage: build
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache git
    - export GITLAB_IP=$(getent hosts nginx-proxy | awk '{print $1}')
    - if [ -z "$GITLAB_IP" ]; then export GITLAB_IP=$(getent hosts nginx | awk '{print $1}'); fi
    - if [ -z "$GITLAB_IP" ]; then export GITLAB_IP=$(getent hosts gitlab | awk '{print $1}'); fi
    - if [ -n "$GITLAB_IP" ]; then echo "$GITLAB_IP gitlab.trancondev.site" >> /etc/hosts; fi
    - export GIT_SSL_NO_VERIFY=true
    - git clone -b $CI_COMMIT_REF_NAME --depth 1 "$CI_REPOSITORY_URL" .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - docker build -f docker/web-v2.Dockerfile
        -t $REGISTRY/web-v2:$IMAGE_TAG
        -t $REGISTRY/web-v2:latest .
    - docker push $REGISTRY/web-v2:$IMAGE_TAG
    - docker push $REGISTRY/web-v2:latest

# ─── Deploy Stage ─────────────────────────────────────────────────
deploy:web-v2:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - printf '%b\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-add ~/.ssh/deploy_key
    - echo "$DEPLOY_HOST_KEY" >> ~/.ssh/known_hosts
  needs:
    - job: build:web-v2
  script:
    - ssh $DEPLOY_USER@$DEPLOY_HOST "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker pull $REGISTRY/web-v2:$IMAGE_TAG &&
        docker kill web-v2 2>/dev/null || true &&
        docker rm web-v2 2>/dev/null || true &&
        docker run -d --name web-v2 --restart unless-stopped
          -p 33990:80
          $REGISTRY/web-v2:$IMAGE_TAG"
    - echo "web-v2 running at http://$DEPLOY_HOST:33990"
