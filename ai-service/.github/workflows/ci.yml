name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r requirements/ai-api.txt \
            -r requirements/rag-service.txt \
            -r requirements/dev.txt

      - name: Validate installed dependencies
        run: pip check

      - name: Lint
        run: ruff check services tests

      - name: Compile Python modules
        run: python -m compileall -q services tests

      - name: Run tests
        run: pytest -q
